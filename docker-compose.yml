version: "3.8"

services:
  agendador-tarefas:
    build: ..\agendador-tarefas
    container_name: agendador-tarefas
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/agendador_db
    depends_on:
      - mongo
  bff-agendador-tarefas:
    build: .
    container_name: bff-agendador-tarefas
    ports:
      - "8084:8084"
    environment:
      - USUARIO_URL=usuario:8080/usuario
      - AGENDADOR_TAREFAS_URL=agendador-tarefas:8082/tarefas
      - NOTIFICACAO_URL=notificacao:8083/email
  usuario:
    build: ..\usuario
    container_name: usuario
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/usuario_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=admin
    depends_on:
      - postgres
  notificacao:
    build: ..\notificacao
    container_name: notificacao
    ports:
      - "8083:8083"
  postgres:
    image: postgres:latest
    container_name: postgres
    restart: no
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: usuario_db
    ports:
      - "5433:5432"


  mongo:
    image: mongo:latest
    container_name: mongo
    restart: no
    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_DATABASE: agendador_db

networks:
  default:
    driver: bridge